version: '3.8'

services:
  db:
    image: postgis/postgis:17-3.5
    container_name: haerd_dating_db
    restart: always
    environment:
      POSTGRES_USER: haerdappuser
      POSTGRES_PASSWORD: H@erd_2025
      POSTGRES_DB: haerd_dating_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - haerd-dating-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
      #dockerfile: Dockerfile.local
    container_name: haerd_dating_api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8080:8080"
    networks:
      - haerd-dating-network

volumes:
  pgdata:

networks:
  haerd-dating-network: